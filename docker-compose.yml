services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threat_detection
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      ENGINE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/threat_detection
      ENGINE_THREAT_DB_PATH: /app/data/threat_hashes.txt
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      # Writable so the engine can persist the anomaly model (global_model.joblib)
      - ./data/models:/app/data/models
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "engine.main:app", "--host", "0.0.0.0", "--port", "8000"]

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - engine

volumes:
  pgdata: {}
